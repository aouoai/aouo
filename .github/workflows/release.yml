name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package version
        run: |
          PACKAGE_VERSION=$(node -p "require('./packages/agent/package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PACKAGE_VERSION"
            exit 1
          fi

      - run: pnpm build
      - run: pnpm test

      - name: Publish
        working-directory: packages/agent
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          PUBLISH_TAG=latest
          if [[ "$PACKAGE_VERSION" == *-* ]]; then
            PUBLISH_TAG=next
          fi

          pnpm publish --no-git-checks --access public --tag "$PUBLISH_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
